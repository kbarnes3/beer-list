name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
    pull-requests: write

jobs:
  build_and_deploy_job:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'pull_request_target' && github.event.action != 'closed' && github.actor == 'dependabot[bot]')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true
          lfs: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.17.0
      - run: npm ci
      - run: npm run build
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_WATER_0DC55C31E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "dist/browser" # Prebuilt app output (skip_app_build uploads from here directly)
          api_location: "" # Api source code path - optional
          skip_app_build: true # App is prebuilt above with a Node version compatible with Angular 22
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.actor == 'dependabot[bot]')
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_WATER_0DC55C31E }}
          action: "close"
